name: balanceflow
description: BalanceFlow — personal finance tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # HTTP
  dio: ^5.4.3+1

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Charts
  fl_chart: ^0.68.0

  # Blur effect for nav bar
  glass_kit: ^3.0.0

dependencies_overrides: {}

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
