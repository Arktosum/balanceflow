name: balanceflow
description: BalanceFlow — personal finance tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # HTTP
  dio: ^5.4.3+1

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Charts
  fl_chart: ^0.68.0

  # Blur effect for nav bar
  glass_kit: ^3.0.0

  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  shared_preferences: ^2.3.3


dependencies_overrides: {}

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0D0F17"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"